# For more details on the format and content:
# https://github.com/joshyorko/rcc/blob/master/docs/recipes.md#what-is-in-condayaml
# Tip: Adding a link to the release notes of the packages helps maintenance and security.

channels:
  - conda-forge

dependencies:
  - python=3.12.11                 # https://pyreadiness.org/3.10
  - uv=0.11.14                      # https://pypi.org/project/uv
  - pip:
    - rpaframework==32.0.0       # https://rpaframework.org/releasenotes.html
    - robocorp==3.1.1             # https://pypi.org/project/robocorp
    - robocorp-browser==2.4.0     # https://pypi.org/project/robocorp-browser
    - requests==2.34.1            # https://pypi.org/project/requests
    - robocorp-truststore==0.9.1  # https://pypi.org/project/robocorp-truststore