# For more details on the format and content:
# https://github.com/joshyorko/rcc/blob/master/docs/recipes.md#what-is-in-condayaml
# Tip: Adding a link to the release notes of the packages helps maintenance and security.

channels:
  - conda-forge

dependencies:
  - python=3.12.11
  - uv=0.11.14
  - pip:
      - robocorp==3.1.1 # https://pypi.org/project/robocorp
      - robocorp-truststore==0.9.1 # https://pypi.org/project/robocorp-truststore
      - rpaframework-assistant==6.0.0 # https://pypi.org/project/rpaframework-assistant
      - requests==2.34.1 # https://pypi.org/project/requests
      - gitpython==3.1.50 # https://pypi.org/project/GitPython
      - pandas==3.0.3 # https://pypi.org/project/pandas
      - beautifulsoup4==4.14.3 # https://pypi.org/project/beautifulsoup4
      - jinja2==3.1.6 # https://pypi.org/project/Jinja2
      - redis==7.4.0 # https://pypi.org/project/redis
      - psycopg2-binary==2.9.12 # https://pypi.org/project/psycopg2-binary
      - SQLAlchemy==2.0.49 # https://pypi.org/project/SQLAlchemy
      - pymongo==4.17.0 # https://pypi.org/project/pymongo
      - robocorp-adapters-custom==0.1.6 # https://pypi.org/project/robocorp-adapters-custom
