# For more details on the format and content:
# https://github.com/joshyorko/rcc/blob/master/docs/recipes.md#what-is-in-robotyaml

tasks:
  RunAssistant:
    shell: python -m robocorp.tasks run tasks.py -t run_assistant


devTasks:
  SmokeLocal:
    shell: python -m robocorp.tasks run test-openai.py -t smoke_local

  TestKeys:
    shell: python -m robocorp.tasks run test-openai.py -t check_openai_credentials

environmentConfigs:
  - environment_windows_amd64_freeze.yaml
  - environment_linux_amd64_freeze.yaml
  - environment_darwin_amd64_freeze.yaml
  - conda.yaml

artifactsDir: output

PATH:
  - .
PYTHONPATH:
  - .
ignoreFiles:
  - .gitignore
