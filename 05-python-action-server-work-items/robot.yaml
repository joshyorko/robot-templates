# For more details on the format and content:
# https://github.com/joshyorko/rcc/blob/master/docs/recipes.md#what-is-in-robotyaml

tasks:
  Producer:
    shell: python -m robocorp.tasks run tasks.py -t producer
  Consumer:
    shell: python -m robocorp.tasks run tasks.py -t consumer
  Reporter:
    shell: python -m robocorp.tasks run tasks.py -t reporter


devTasks:
  SeedFile:
    shell: python scripts/seed_workitems.py --env devdata/env-for-producer.json
  SeedSQLiteDB:
    shell: python scripts/seed_workitems.py --env devdata/env-sqlite-producer.json
  SeedRedisDB:
    shell: python scripts/seed_workitems.py --env devdata/env-redis-producer.json
  SeedDocDB:
    shell: python scripts/seed_workitems.py --env devdata/env-docdb-local-producer.json
  SmokeFile:
    shell: python scripts/smoke_workitems.py --adapter file
  SmokeSQLite:
    shell: python scripts/smoke_workitems.py --adapter sqlite
  SmokeRedis:
    shell: python scripts/smoke_workitems.py --adapter redis
  SmokeDocDB:
    shell: python scripts/smoke_workitems.py --adapter docdb
  SmokeLocalAdapters:
    shell: python scripts/smoke_workitems.py --adapter file --adapter sqlite
  SmokeServiceAdapters:
    shell: python scripts/smoke_workitems.py --adapter redis --adapter docdb
  SmokeAllAdapters:
    shell: python scripts/smoke_workitems.py --adapter file --adapter sqlite --adapter redis --adapter docdb
  CheckSQLiteDB:
    shell: python scripts/check_sqlite_db.py
  RecoverOrphanedItems:
    shell: python scripts/recover_orphaned_items.py
  DiagnoseReporterIssue:
    shell: python scripts/diagnose_reporter_issue.py

  ListWorkItems:
    shell: python -m robocorp.tasks run scripts/listworkitems.py -t list_work_items

environmentConfigs:
  - environment_windows_amd64_freeze.yaml
  - environment_linux_amd64_freeze.yaml
  - environment_darwin_amd64_freeze.yaml
  - conda.yaml

artifactsDir: output

PATH:
  - .
PYTHONPATH:
  - .
ignoreFiles:
  - .gitignore
